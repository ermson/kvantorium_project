<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'dashboard' %}">
            <i class="fas fa-robot"></i> Кванториум | АРМ Наставника
        </a>
        <div class="d-flex align-items-center">
            <!-- КОЛОКОЛЬЧИК УВЕДОМЛЕНИЙ -->
            <div class="dropdown me-3">
                <button type="button" class="btn btn-outline-light position-relative" data-bs-toggle="dropdown">
                    <i class="fas fa-bell"></i>
                    {% with notifications=get_notifications %}
                    {% if notifications %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ notifications|length }}
                    </span>
                    {% endif %}
                    {% endwith %}
                </button>
                <div class="dropdown-menu dropdown-menu-end" style="width: 300px;">
                    {% with notifications=get_notifications %}
                    {% if notifications %}
                        <h6 class="dropdown-header">Уведомления</h6>
                        {% for note in notifications %}
                        <a class="dropdown-item" href="{{ note.url }}">
                            <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                            {{ note.message }}
                        </a>
                        {% endfor %}
                    {% else %}
                        <div class="text-center py-3">
                            <i class="fas fa-check-circle text-success fa-2x"></i>
                            <p class="mb-0 mt-2">Нет новых уведомлений</p>
                        </div>
                    {% endif %}
                    {% endwith %}
                </div>
            </div>
            <span class="navbar-text me-3">
                <i class="fas fa-user"></i> {{ user.first_name|default:user.username }}
            </span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                <i class="fas fa-sign-out-alt"></i> Выйти
            </a>
        </div>
    </div>
</nav>
