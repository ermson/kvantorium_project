{% extends 'core/base.html' %}

{% block content %}
<h2 class="mb-4">
    {% if student %}Редактировать ученика{% else %}Новый ученик{% endif %}
</h2>

<div class="card shadow">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <!-- Строка 1: Фамилия, Имя, Отчество -->
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="last_name" class="form-label">Фамилия *</label>
                    <input type="text" name="last_name" id="last_name" class="form-control" value="{{ student.last_name|default:'' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="first_name" class="form-label">Имя *</label>
                    <input type="text" name="first_name" id="first_name" class="form-control" value="{{ student.first_name|default:'' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="middle_name" class="form-label">Отчество</label>
                    <input type="text" name="middle_name" id="middle_name" class="form-control" value="{{ student.middle_name|default:'' }}">
                </div>
            </div>

            <!-- Строка 2: Направление и Наставник -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="group_name" class="form-label">Направление *</label>
                    <select name="group_name" id="group_name" class="form-select" required>
                        <option value="">Выберите направление</option>
                        {% for choice in group_choices %}
                        <option value="{{ choice }}" {% if student.group_name == choice %}selected{% endif %}>
                            {{ choice }}
                        </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">Группа — специализация внутри квантума</small>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="mentor" class="form-label">Наставник *</label>
                    <select name="mentor" id="mentor" class="form-select" required>
                        <option value="">Выберите наставника</option>
                        {% for mentor in mentors %}
                        <option value="{{ mentor.id }}" {% if student.mentor.id == mentor.id %}selected{% endif %}>
                            {{ mentor.user.last_name }} {{ mentor.user.first_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Строка 3: Дата поступления -->
            <div class="mb-3">
                <label for="enrollment_date" class="form-label">Дата поступления *</label>
                <input type="date" name="enrollment_date" id="enrollment_date" class="form-control" value="{{ student.enrollment_date|date:'Y-m-d'|default:'' }}" required>
            </div>

            <!-- Кнопки -->
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'student_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
