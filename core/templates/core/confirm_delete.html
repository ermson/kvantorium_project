{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4><i class="fas fa-trash"></i> Подтверждение удаления</h4>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить "{{ object }}"?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    {% if type == 'student' %}
                        <a href="{% url 'student_list' %}" class="btn btn-secondary">Отмена</a>
                    {% elif type == 'stage' %}
                        <a href="{% url 'stage_list' %}" class="btn btn-secondary">Отмена</a>
                    {% else %}
                        <a href="{% url 'project_list' %}" class="btn btn-secondary">Отмена</a>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
